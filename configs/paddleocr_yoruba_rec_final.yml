Global:
  use_gpu: false
  epoch_num: 40
  log_smooth_window: 20
  print_batch_step: 10
  save_model_dir: /Users/mac/Desktop/yoruba_ocr_research/experiments/finetuned
  save_epoch_step: 10
  eval_batch_step:
  - 0
  - 2000
  cal_metric_during_train: true
  pretrained_model: /Users/mac/Desktop/yoruba_ocr_research/experiments/baseline/pretrained/en_PP-OCRv4_rec_train/best_accuracy
  checkpoints: null
  save_inference_dir: null
  use_visualdl: false
  character_dict_path: /Users/mac/Desktop/yoruba_ocr_research/data/processed/dictionary/yoruba_char_dict.txt
  max_text_length: 80
  infer_mode: false
  use_space_char: true
  distributed: false
  save_res_path: /Users/mac/Desktop/yoruba_ocr_research/results/tables/rec_eval_output.txt
Optimizer:
  name: Adam
  beta1: 0.9
  beta2: 0.999
  lr:
    name: MultiStepDecay
    learning_rate: 0.0005
    milestones:
    - 60
    - 80
    gamma: 0.1
    warmup_epoch: 5
  regularizer:
    name: L2
    factor: 3.0e-05
Architecture:
  model_type: rec
  algorithm: SVTR_LCNet
  Transform: null
  Backbone:
    name: MobileNetV1Enhance
    scale: 0.5
    last_conv_stride:
    - 1
    - 2
    last_pool_type: avg
    last_pool_kernel_size:
    - 2
    - 4
  Neck:
    name: SequenceEncoder
    encoder_type: svtr
    dims: 64
    depth: 2
    hidden_dims: 120
    use_guide: true
  Head:
    name: CTCHead
    fc_decay: 1.0e-05
Loss:
  name: CTCLoss
PostProcess:
  name: CTCLabelDecode
Metric:
  name: RecMetric
  main_indicator: acc
  ignore_space: false
Train:
  dataset:
    name: SimpleDataSet
    data_dir: /Users/mac/Desktop/yoruba_ocr_research/data/processed
    label_file_list:
    - /Users/mac/Desktop/yoruba_ocr_research/data/processed/labels/train.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - RecAug: null
    - CTCLabelEncode: null
    - RecResizeImg:
        image_shape:
        - 3
        - 48
        - 320
    - KeepKeys:
        keep_keys:
        - image
        - label
        - length
  loader:
    shuffle: true
    batch_size_per_card: 64
    drop_last: true
    num_workers: 4
Eval:
  dataset:
    name: SimpleDataSet
    data_dir: /Users/mac/Desktop/yoruba_ocr_research/data/processed
    label_file_list:
    - /Users/mac/Desktop/yoruba_ocr_research/data/processed/labels/val.txt
    transforms:
    - DecodeImage:
        img_mode: BGR
        channel_first: false
    - CTCLabelEncode: null
    - RecResizeImg:
        image_shape:
        - 3
        - 48
        - 320
    - KeepKeys:
        keep_keys:
        - image
        - label
        - length
  loader:
    shuffle: false
    drop_last: false
    batch_size_per_card: 128
    num_workers: 4
